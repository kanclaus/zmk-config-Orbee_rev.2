CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- バッテリー ---
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_BT_BAS=y
# ▼まずは最小構成で通す
CONFIG_ZMK_BATTERY_VOLTAGE_MIN=3300
# CONFIG_ZMK_BATTERY_VOLTAGE_MAX=4200
# CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# 旧設定（中央が代理で左右まとめて送ってた）→左右別表示のため残すが無効化
